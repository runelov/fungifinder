name = "fungifinder-api"
main = "src/index.js"
compatibility_date = "2026-07-12"

# Merk: å legge til denne routen slår automatisk av den gamle
# <name>.<konto>.workers.dev-URL-en for denne Workeren ved neste deploy —
# samme oppførsel som Bondøyas api.bondoya.no. js/api-client.js sin
# API_BASE må derfor allerede peke til api.fungifinder.no (og være live på
# fungifinder.no) FØR denne deployes, ellers oppstår et nedetidsvindu.
routes = [
  { pattern = "api.fungifinder.no", custom_domain = true }
]

[[d1_databases]]
binding = "DB"
database_name = "fungifinder"
database_id = "0e527357-62d8-4e34-9aff-b9e531bd500c"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "2f7c380270ac4c7488a4df0530b9101c"

[vars]
# Bar opprinnelse (origin, uten sti) — brukt av CORS. IKKE bruk denne som
# redirect-mål, se APP_URL.
ALLOWED_ORIGIN = "https://fungifinder.no"
# Selve appens fulle URL — brukt som redirect-mål etter
# magic-link-verifisering, se routes/auth.js.
APP_URL = "https://fungifinder.no/"
ENVIRONMENT = "production"

# GITHUB_PAT, TURNSTILE_SECRET_KEY og (senere) RESEND_API_KEY settes IKKE
# her — sett dem med:
#   wrangler secret put GITHUB_PAT
#   wrangler secret put TURNSTILE_SECRET_KEY
#   wrangler secret put RESEND_API_KEY
# aldri i denne filen eller noe annet sted i det offentlige repoet.
